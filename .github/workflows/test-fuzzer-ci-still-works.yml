name: test-fuzzer-ci-still-works
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - '**'
      - '!main'

jobs:
  print-vars:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "github.actor: ${{ github.actor }}"
          echo "github.head_ref: ${{ github.head_ref }}"
          echo "github.ref_name: ${{ github.ref_name }}"
          echo "github.sha: ${{ github.sha }}"

  build-duckdb:
    name: Build DuckDB
    uses: duckdblabs/duckdb-fuzzer-ci/.github/workflows/build_fuzzer.yml@main
    with:
      git_url: ${{ github.actor }}/duckdb-sqlsmith
      git_tag: ${{ github.head_ref || github.sha }}
      timeout-minutes: 120

  fuzzer:
    name: Fuzzer
    needs:
    - build-duckdb
    strategy:
      fail-fast: false
      matrix:
        fuzzer: [duckfuzz, sqlsmith, duckfuzz_functions]
        data: [emptyalltypes]
        enable_verification: [true, false]
        exclude:
          - enable_verification: true
            fuzzer: sqlsmith
          - enable_verification: true
            fuzzer: duckfuzz_functions
    uses: duckdblabs/duckdb-fuzzer-ci/.github/workflows/fuzz_duckdb.yml@main
    with:
      fuzzer: ${{ matrix.fuzzer }}
      data: ${{ matrix.data }}
      timeout-minutes: 20
      max_queries: 10
      enable_verification: ${{ matrix.enable_verification }}
      repo: ${{ github.repository }}
    secrets:
      DUCKDB_HASH: ${{ needs.build-duckdb.outputs.hash }}
